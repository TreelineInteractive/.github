name: Claude Issue Solver (Reusable)

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      USERNAME_ADMIN:
        required: false
      PASSWORD_ADMIN:
        required: false

jobs:
  solve:
    runs-on: [self-hosted, macOS, X64]
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node + Corepack
        uses: actions/setup-node@v4
        with:
          node-version: '20.9.0'
      - name: Enable Corepack
        run: corepack enable

      - name: Configure git
        run: |
          git config user.name "claude-agent"
          git config user.email "claude-agent@users.noreply.github.com"

      - name: Create branch
        id: branch
        run: |
          BRANCH="claude/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Comment on issue — starting
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "🤖 **Claude is on it.** Working on a fix now — will open a PR when done."

      - name: Boot app stack (if repo provides stack-up.sh)
        id: stack
        if: hashFiles('scripts/stack-up.sh') != ''
        env:
          USERNAME_ADMIN: ${{ secrets.USERNAME_ADMIN }}
          PASSWORD_ADMIN: ${{ secrets.PASSWORD_ADMIN }}
        run: |
          ./scripts/stack-up.sh
          echo "up=true" >> $GITHUB_OUTPUT

      - name: Write Playwright MCP config
        if: hashFiles('scripts/stack-up.sh') != ''
        run: |
          mkdir -p .claude-agent
          cat > .claude-agent/mcp.json <<'JSON'
          {
            "mcpServers": {
              "playwright": {
                "command": "npx",
                "args": ["-y", "@playwright/mcp@latest", "--headless"]
              }
            }
          }
          JSON

      - name: Solve issue with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          FRONTEND_URL: http://localhost:5173
          USERNAME_ADMIN: ${{ secrets.USERNAME_ADMIN }}
          PASSWORD_ADMIN: ${{ secrets.PASSWORD_ADMIN }}
          STACK_UP: ${{ steps.stack.outputs.up }}
        run: |
          STACK_CONTEXT=""
          MCP_FLAGS=""
          TOOLS="Read,Write,Edit,Bash,Glob,Grep"
          if [[ "$STACK_UP" == "true" ]]; then
            STACK_CONTEXT="

          The app stack is running locally on this machine:
          - Frontend: $FRONTEND_URL
          - Admin login: $USERNAME_ADMIN / $PASSWORD_ADMIN
          You have Playwright MCP tools (mcp__playwright__*) — drive a real browser to reproduce the issue, verify your fix, and capture screenshots when helpful."
            MCP_FLAGS="--mcp-config .claude-agent/mcp.json"
            TOOLS="$TOOLS,mcp__playwright__*"
          fi

          PROMPT="You are a software engineer working on a GitHub repository. Your job is to fix the following issue.

          Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          ---
          ${ISSUE_BODY}
          ---
          ${STACK_CONTEXT}

          Instructions:
          - Explore the codebase to understand the structure and relevant code
          - Make the necessary changes to fix the issue
          - Commit your changes frequently as you work using 'git add -A && git commit -m \"<message>\"' so progress is saved and a developer can take over if needed
          - Write clean, idiomatic code that matches the existing style
          - If there are tests, make sure they pass
          - Do not open a PR — that will be handled automatically after you're done"

          echo "$PROMPT" | claude -p \
            --model claude-sonnet-4-6 \
            $MCP_FLAGS \
            --allowedTools "$TOOLS"

      - name: Tear down app stack
        if: always() && steps.stack.outputs.up == 'true'
        run: ./scripts/stack-down.sh || true

      - name: Check for uncommitted changes
        id: changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            # Check if any commits were made on this branch vs base
            COMMITS=$(git rev-list HEAD ^origin/${{ github.event.repository.default_branch }} --count 2>/dev/null || echo "0")
            if [ "$COMMITS" -gt "0" ]; then
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          else
            git commit -m "chore: final staged changes from Claude"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Push branch
        if: steps.changes.outputs.has_changes == 'true'
        run: git push origin "${{ steps.branch.outputs.name }}"

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "fix: issue #${{ github.event.issue.number }} (${{ github.event.issue.title }})" \
            --body "Closes #${{ github.event.issue.number }}

          ---
          🤖 Automatically generated by [Claude Sonnet](https://anthropic.com) via the \`claude\` label.

          Branch \`${{ steps.branch.outputs.name }}\` is available to check out and continue work if needed." \
            --head "${{ steps.branch.outputs.name }}" \
            --base "${{ github.event.repository.default_branch }}"

      - name: Comment — no changes
        if: steps.changes.outputs.has_changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "🤖 **Claude couldn't make changes automatically.** This issue may need more context or manual intervention."
